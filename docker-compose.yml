services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "5555:5555"
    environment:
      - PORT=5555
    networks:
      - iris-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/5555' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=5555
    stdin_open: true
    tty: true
    networks:
      - iris-net

networks:
  iris-net:
    driver: bridge
